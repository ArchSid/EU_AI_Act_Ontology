### GraphRAG v3 settings ###

## LLM completion models ##
completion_models:
  default_completion_model:
    model_provider: gemini
    model: gemini-3.1-flash-lite-preview
    api_key: ${GRAPHRAG_API_KEY}
    auth_method: api_key
    max_tokens: 4000
    request_timeout: 180.0
    requests_per_minute: 10
    tokens_per_minute: 100000
    retry:
      type: exponential_backoff
      max_retries: 5
    sleep_on_rate_limit_recommendation: true

## Embedding models ##
embedding_models:
  default_embedding_model:
    model_provider: gemini
    model: gemini-embedding-001
    api_key: ${GRAPHRAG_API_KEY}
    auth_method: api_key
    batch_size: 16
    requests_per_minute: 10
    retry:
      type: exponential_backoff

## Input ##
input:
  type: text

input_storage:
  type: file
  base_dir: "input"

## Chunking ##
chunking:
  size: 800
  overlap: 150
  encoding_model: cl100k_base

## Output storage ##
output_storage:
  type: file
  base_dir: "output"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

## Workflow settings ##
extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/2-entity_extraction.txt"
  entity_types: [AISystem,Actor,Obligation,RiskCategory,Authority,Requirement,Article,AnnexIIICategory,ExclusionCondition,ClassificationRule,DelegatedAct,SystemicRisk,CodeOfPractice,SeriousIncident,Complaint]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model

community_reports:
  completion_model_id: default_completion_model
  max_length: 1500
  max_input_length: 6000

embed_text:
  embedding_model_id: default_embedding_model